services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.3
    container_name: tf-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "22181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.3
    container_name: tf-kafka
    depends_on:
      - zookeeper
    ports:
      - "19092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:19092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b kafka:29092 1 30"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: tf-minio
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - tf-minio-data:/data

  bf-topic-init:
    build:
      context: ./app
    container_name: tf-topic-init
    working_dir: /app
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_ORDERS: blackfriday_orders
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: lakehouse
      SEED_ORDERS_PATH: /app/data/seed/orders_seed.csv
      SEED_TARGETS_PATH: /app/data/seed/seller_targets.csv
      DASHBOARD_METRICS_KEY: metrics/dashboard_latest.json
      PROCESSOR_BATCH_SIZE: 400
      PROCESSOR_FLUSH_SECONDS: 3
      GENERATOR_EVENTS_PER_SECOND: 25
    volumes:
      - ./app/src:/app/src
      - ./data:/app/data
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_started
    command: ["python", "src/topic_setup.py"]
    restart: on-failure

  bf-seed-bootstrap:
    build:
      context: ./app
    container_name: tf-seed-bootstrap
    working_dir: /app
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_ORDERS: blackfriday_orders
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: lakehouse
      SEED_ORDERS_PATH: /app/data/seed/orders_seed.csv
      SEED_TARGETS_PATH: /app/data/seed/seller_targets.csv
      DASHBOARD_METRICS_KEY: metrics/dashboard_latest.json
      PROCESSOR_BATCH_SIZE: 400
      PROCESSOR_FLUSH_SECONDS: 3
      GENERATOR_EVENTS_PER_SECOND: 25
    volumes:
      - ./app/src:/app/src
      - ./data:/app/data
    depends_on:
      bf-topic-init:
        condition: service_completed_successfully
    command: ["python", "src/bootstrap_seed.py"]
    restart: on-failure

  bf-generator:
    build:
      context: ./app
    container_name: tf-generator
    working_dir: /app
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_ORDERS: blackfriday_orders
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: lakehouse
      SEED_ORDERS_PATH: /app/data/seed/orders_seed.csv
      SEED_TARGETS_PATH: /app/data/seed/seller_targets.csv
      DASHBOARD_METRICS_KEY: metrics/dashboard_latest.json
      PROCESSOR_BATCH_SIZE: 400
      PROCESSOR_FLUSH_SECONDS: 3
      GENERATOR_EVENTS_PER_SECOND: 25
    volumes:
      - ./app/src:/app/src
      - ./data:/app/data
    depends_on:
      bf-topic-init:
        condition: service_completed_successfully
    command: ["python", "src/stream_generator.py"]
    restart: unless-stopped

  bf-processor:
    build:
      context: ./app
    container_name: tf-processor
    working_dir: /app
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_ORDERS: blackfriday_orders
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: lakehouse
      SEED_ORDERS_PATH: /app/data/seed/orders_seed.csv
      SEED_TARGETS_PATH: /app/data/seed/seller_targets.csv
      DASHBOARD_METRICS_KEY: metrics/dashboard_latest.json
      PROCESSOR_BATCH_SIZE: 400
      PROCESSOR_FLUSH_SECONDS: 3
      GENERATOR_EVENTS_PER_SECOND: 25
    volumes:
      - ./app/src:/app/src
      - ./data:/app/data
    depends_on:
      bf-seed-bootstrap:
        condition: service_completed_successfully
    command: ["python", "src/stream_processor.py"]
    restart: unless-stopped

  bf-dashboard:
    build:
      context: ./app
    container_name: tf-dashboard
    working_dir: /app
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_ORDERS: blackfriday_orders
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: lakehouse
      SEED_ORDERS_PATH: /app/data/seed/orders_seed.csv
      SEED_TARGETS_PATH: /app/data/seed/seller_targets.csv
      DASHBOARD_METRICS_KEY: metrics/dashboard_latest.json
      PROCESSOR_BATCH_SIZE: 400
      PROCESSOR_FLUSH_SECONDS: 3
      GENERATOR_EVENTS_PER_SECOND: 25
    volumes:
      - ./app/src:/app/src
      - ./data:/app/data
    depends_on:
      bf-processor:
        condition: service_started
    command:
      - streamlit
      - run
      - src/dashboard.py
      - --server.address=0.0.0.0
      - --server.port=8501
      - --browser.gatherUsageStats=false
    ports:
      - "18501:8501"
    restart: unless-stopped

volumes:
  tf-minio-data:

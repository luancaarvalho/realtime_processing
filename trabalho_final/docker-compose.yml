version: "3.9"

services:

  generator:
    build: .
    container_name: bf_generator
    volumes:
      - db_data:/app/data
    environment:
      - DB_PATH=/app/data/blackfriday.db
      - PYTHONUNBUFFERED=1
    # Cria o banco na primeira vez e inicia o gerador
    command: >
      sh -c "python setup_db.py && python generator.py"
    restart: unless-stopped

  dashboard:
    build: .
    container_name: bf_dashboard
    volumes:
      - db_data:/app/data
    environment:
      - DB_PATH=/app/data/blackfriday.db
      - PYTHONUNBUFFERED=1
    ports:
      - "8501:8501"
    # Aguarda o banco existir antes de subir o Streamlit
    command: >
      sh -c "
        echo 'Aguardando banco de dados...';
        until [ -f /app/data/blackfriday.db ]; do sleep 1; done;
        echo 'Banco encontrado. Iniciando dashboard...';
        streamlit run dashboard.py
          --server.address=0.0.0.0
          --server.port=8501
          --server.headless=true
          --server.fileWatcherType=none
      "
    depends_on:
      - generator
    restart: unless-stopped

volumes:
  db_data:

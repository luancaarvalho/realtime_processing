version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: rtp_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - realtime_net

  broker:
    image: confluentinc/cp-kafka:7.5.0
    container_name: rtp_broker
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - realtime_net

  kafka_init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: rtp_kafka_init
    depends_on:
      - broker
    networks:
      - realtime_net
    command: >
      bash -c "
        echo 'Aguardando broker ficar pronto...';
        cub kafka-ready -b broker:9092 1 40 &&
        kafka-topics --bootstrap-server broker:9092 --create --if-not-exists --topic orders.v1 --partitions 1 --replication-factor 1 &&
        echo 'Topico orders.v1 garantido com sucesso'
      "

  django:
    build:
      context: ./django
      dockerfile: Dockerfile
    container_name: rtp_django
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./django:/app
    ports:
      - "8000:8000"
    env_file:
      - ./django/.env
    depends_on:
      - broker
    networks:
      - realtime_net

  flask:
    build:
      context: ./flask
      dockerfile: Dockerfile
    container_name: rtp_flask
    command: python app.py
    volumes:
      - ./flask:/app
    ports:
      - "5000:5000"
    env_file:
      - ./flask/.env
    depends_on:
      - broker
      - django
      - kafka_init
    networks:
      - realtime_net

  flask_consumer:
    build:
      context: ./flask
      dockerfile: Dockerfile
    container_name: rtp_flask_consumer
    command: sh -c "sleep 5 && python run_consumer.py"
    volumes:
      - ./flask:/app
    env_file:
      - ./flask/.env
    depends_on:
      - broker
      - django
      - kafka_init
    networks:
      - realtime_net

networks:
  realtime_net:
    driver: bridge

x-app-common: &bf-app-common
  build:
    context: ./trabalho/app
  working_dir: /app
  environment:
    PYTHONUNBUFFERED: "1"
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092,kafka-2:29093,kafka-3:29094
    KAFKA_TOPIC_ORDERS: blackfriday_orders
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: minioadmin
    MINIO_SECRET_KEY: minioadmin
    MINIO_BUCKET: lakehouse
    ICEBERG_CATALOG_URI: sqlite:////app/data/out/pyiceberg_catalog.db
    ICEBERG_NAMESPACE: blackfriday
    ICEBERG_TABLE: orders_events
    DASHBOARD_METRICS_KEY: metrics/dashboard_latest.json
  volumes:
    - ./trabalho/app/src:/app/src
    - ./trabalho/data:/app/data
  # Removidas as dependências de infraestrutura (kafka, minio) daqui.
  # A aplicação dentro do container ainda se conectará a eles pelo nome de host,
  # mas a dependência de inicialização é gerenciada pelo docker-compose.infra.yml.

services:
  bf-topic-init:
    <<: *bf-app-common
    container_name: bf-topic-init
    # Não precisa de depends_on aqui, pois o script espera o Kafka internamente.
    command: ["python", "src/topic_setup.py"]
    restart: on-failure

  bf-seed-gen:
    <<: *bf-app-common
    container_name: bf-seed-gen
    command: ["python", "src/generate_seed_dataset.py"]
    restart: on-failure

  bf-seed-bootstrap:
    <<: *bf-app-common
    container_name: bf-seed-bootstrap
    depends_on:
      bf-topic-init:
        condition: service_completed_successfully
      bf-seed-gen:
        condition: service_completed_successfully
      # Não precisa de depends_on para Kafka/Minio aqui, o script espera por eles.
    command: ["python", "src/bootstrap_seed.py"]
    restart: on-failure

  bf-generator:
    <<: *bf-app-common
    container_name: bf-generator
    depends_on:
      bf-topic-init:
        condition: service_completed_successfully
      # Não precisa de depends_on para Kafka aqui, o script espera por ele.
    command: ["python", "src/stream_generator.py"]
    restart: unless-stopped

  bf-processor:
    <<: *bf-app-common
    container_name: bf-processor
    depends_on:
      bf-seed-bootstrap:
        condition: service_completed_successfully
      # Não precisa de depends_on para Kafka/Minio/MySQL aqui, o script espera por eles.
    command: ["python", "src/stream_processor.py"]
    restart: unless-stopped

  bf-dashboard:
    <<: *bf-app-common
    container_name: bf-dashboard
    depends_on:
      bf-processor:
        condition: service_started
    command:
      - streamlit
      - run
      - src/dashboard.py
      - --server.address=0.0.0.0
      - --server.port=8501
      - --browser.gatherUsageStats=false
    ports:
      - "8505:8501"
    restart: unless-stopped

networks:
  default:
    name: kafka_net
    external: true
